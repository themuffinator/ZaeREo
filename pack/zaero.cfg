// Optional Zaero conveniences. This file deliberately changes no user binds.
alias newgame_zaero "exec zaerostart.cfg"
alias dedicated_start_zaero "gamemap zbase1"

// Zaero 1.1 number-key compatibility. Run zwepas_on or zwepas_off explicitly.
alias zwepas_on1 "bind 1 use weapon 1; bind 2 use weapon 2; bind 3 use weapon 3; bind 4 use weapon 4; bind 5 use weapon 5"
alias zwepas_on2 "bind 6 use weapon 6; bind 7 use weapon 7; bind 8 use weapon 8; bind 9 use weapon 9; bind 0 use weapon 10"
alias zwepas_on "zwepas_on1; zwepas_on2; echo Zaero multiselect weapons on"
alias zwepas_off1 "bind 1 use blaster; bind 2 use shotgun; bind 3 use super shotgun; bind 4 use machinegun; bind 5 use chaingun"
alias zwepas_off2 "bind 6 use grenade launcher; bind 7 use rocket launcher; bind 8 use hyperblaster; bind 9 use railgun; bind 0 use bfg10k"
alias zwepas_off "zwepas_off1; zwepas_off2; echo Zaero multiselect weapons off"
